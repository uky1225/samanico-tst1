<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 (Notice)</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-size: 1.5rem; color: #212529; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-top: 0; }
        .notice-item { border-bottom: 1px solid #e9ecef; padding: 15px 0; }
        .notice-item:last-child { border-bottom: none; }
        .notice-title { font-size: 1.1rem; font-weight: bold; margin: 0 0 5px 0; }
        .date { font-size: 0.8rem; color: #868e96; margin-bottom: 10px; }
        .notice-content { font-size: 0.95rem; line-height: 1.5; color: #495057; margin: 0; }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #007bff; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📢 공지사항</h1>
        <div class="notice-item">
            <p class="notice-title">🎉 PWA 서비스 정식 오픈!</p>
            <p class="date">2026-07-10</p>
            <p class="notice-content">우리 앱이 드디어 PWA로 출시되었습니다. 스마트폰 홈 화면에 추가해서 더욱 편리하게 이용해 보세요!</p>
        </div>
        <a href="../" class="back-btn">← 홈으로 돌아가기</a>
    </div>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }
    </script>
</body>
</html>
